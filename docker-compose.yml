services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: datascalr
      POSTGRES_PASSWORD: datascalr
      POSTGRES_DB: datascalr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./target-api/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datascalr"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  target-api:
    build: ./target-api
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://datascalr:datascalr@postgres:5432/datascalr
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
